version: '3.8'

networks:
  futures-net:
    driver: bridge

volumes:
  mysql_data:
  mysql_slave_data:
  nacos_data:
  redis_data:
  es_data:
  prometheus_data:
  grafana_data:
  skywalking_data:

services:
  # ==========================================
  # 1. 数据库 - MySQL 8.0 主从复制
  # ==========================================
  mysql-master:
    image: mysql:8.0
    container_name: futures-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-futures123}
      MYSQL_DATABASE: futures_order
      MYSQL_USER: futures
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-futures123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/scripts/mysql-master.cnf:/etc/mysql/conf.d/master.cnf:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - futures-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  mysql-slave:
    image: mysql:8.0
    container_name: futures-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-futures123}
      MYSQL_DATABASE: futures_order
      MYSQL_USER: futures
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-futures123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_slave_data:/var/lib/mysql
      - ./infrastructure/scripts/mysql-slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'


  # ==========================================
  # 0. 数据库初始化（首次启动时执行）
  # ==========================================
  init-db:
    image: mysql:8.0
    container_name: futures-init-db
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for MySQL master..."
        until mysqladmin ping -h mysql-master -u root -pfutures123 --silent; do
          sleep 2
        done
        echo "MySQL ready. Initializing schema..."
        mysql -h mysql-master -u root -pfutures123 < /scripts/init-schema.sql
        echo "Schema initialization complete!"
    volumes:
      - ./infrastructure/scripts/init-schema.sql:/scripts/init-schema.sql:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - futures-net

  # ==========================================
  # 2. 缓存 - Redis 7 哨兵模式
  # ==========================================
  redis-master:
    image: redis:7-alpine
    container_name: futures-redis-master
    ports:
      - "6379:6379"
    command: redis-server --requirepass futures123 --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - futures-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "futures123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: futures-redis-sentinel-1
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infrastructure/scripts/redis-sentinel.conf:/etc/redis/sentinel.conf:rw
    depends_on:
      - redis-master
    networks:
      - futures-net

  redis-sentinel-2:
    image: redis:7-alpine
    container_name: futures-redis-sentinel-2
    command: redis-sentinel /etc/redis/sentinel.conf
    volumes:
      - ./infrastructure/scripts/redis-sentinel.conf:/etc/redis/sentinel.conf:rw
    depends_on:
      - redis-master
    networks:
      - futures-net

  # ==========================================

  # ==========================================
  # 2B. Redis Slave 节点（哨兵模式）
  # ==========================================
  redis-slave-1:
    image: redis:7-alpine
    container_name: futures-redis-slave-1
    command: redis-server --slaveof futures-redis-master 6379 --requirepass futures123 --masterauth futures123 --appendonly yes
    depends_on:
      - redis-master
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  redis-slave-2:
    image: redis:7-alpine
    container_name: futures-redis-slave-2
    command: redis-server --slaveof futures-redis-master 6379 --requirepass futures123 --masterauth futures123 --appendonly yes
    depends_on:
      - redis-master
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ==========================================
  # 2C. 数据库中间件 - ProxySQL (读写分离)
  # ==========================================
  proxysql:
    image: proxysql/proxysql:2.5.5
    container_name: futures-proxysql
    ports:
      - "6033:6033"   # MySQL 协议端口
      - "6032:6032"   # ProxySQL 管理接口
    volumes:
      - ./infrastructure/scripts/proxysql.cnf:/etc/proxysql.cnf:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # 3. 服务注册与配置 - Nacos
  # ==========================================
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: futures-nacos
    environment:
      MODE: standalone
      MYSQL_SERVICE_HOST: mysql-master
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_USER: futures
      MYSQL_SERVICE_PASSWORD: ${NACOS_DB_PASSWORD:-futures123}
      MYSQL_SERVICE_DB_NAME: nacos_config
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-FuturesPlatformSecretKey2024ForJWT}
      NACOS_AUTH_IDENTITY_KEY: "futures"
      NACOS_AUTH_IDENTITY_VALUE: "futures123"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"   # gRPC 端口
    depends_on:
      mysql-master:
        condition: service_healthy
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  # ==========================================
  # 4. 消息队列 - RocketMQ 5.x
  # ==========================================
  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: futures-rocketmq-ns
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m"
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: futures-rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    ports:
      - "10909:10909"
      - "10911:10911"
    volumes:
      - ./infrastructure/scripts/rocketmq-broker.conf:/home/rocketmq/rocketmq-5.2.0/conf/broker.conf:ro
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.2.0/conf/broker.conf
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  rocketmq-dashboard:
    image: apache/rocketmq-dashboard:latest
    container_name: futures-rocketmq-dash
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8092:8080"
    depends_on:
      - rocketmq-namesrv
    networks:
      - futures-net

  # ==========================================
  # 5. 消息队列备选 - Kafka 3.x
  # ==========================================
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: futures-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: futures-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - futures-net

  # ==========================================
  # 6. 分布式事务 - Seata Server
  # ==========================================
  seata-server:
    image: seataio/seata-server:1.8.0
    container_name: futures-seata
    environment:
      SEATA_IP: seata-server
      SEATA_PORT: 8091
      STORE_MODE: db
      SEATA_CONFIG_NAME: file:/root/seata-config/registry.conf
    ports:
      - "8091:8091"
    volumes:
      - ./infrastructure/scripts/seata-registry.conf:/root/seata-config/registry.conf:ro
    depends_on:
      mysql-master:
        condition: service_healthy
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  # ==========================================
  # 7. 分布式链路追踪 - SkyWalking
  # ==========================================
  elasticsearch:
    image: elasticsearch:7.14.0
    container_name: futures-es
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  skywalking-oap:
    image: apache/skywalking-oap-server:9.4.0
    container_name: futures-skywalking-oap
    environment:
      SW_STORAGE: elasticsearch7
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch:9200
    ports:
      - "11800:11800"   # gRPC
      - "12800:12800"   # HTTP
    depends_on:
      - elasticsearch
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  skywalking-ui:
    image: apache/skywalking-ui:9.4.0
    container_name: futures-skywalking-ui
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "8070:8080"
    depends_on:
      - skywalking-oap
    networks:
      - futures-net

  # ==========================================
  # 8. 监控 - Prometheus + Grafana
  # ==========================================
  prometheus:
    image: prom/prometheus:v2.40.7
    container_name: futures-prometheus
    volumes:
      - ./infrastructure/scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'

  grafana:
    image: grafana/grafana:9.2.20
    container_name: futures-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-futures123}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/scripts/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ==========================================
  # 9. 微服务指标暴露 - Micrometer + Actuator
  # ==========================================
  # 各 Java 微服务需添加 micrometer-registry-prometheus 依赖
  # 并在 application.yml 中暴露 /actuator/prometheus 端点
