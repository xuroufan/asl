# ============================================================
# Nginx SSL 配置 — HTTPS 反向代理到 Gateway
# ============================================================
# 使用方法:
#   1. 替换证书路径为实际文件
#   2. 替换 server_name 为实际域名
#   3. docker compose -f docker-compose.yml up -d nginx
# ============================================================

server {
    listen 80;
    server_name futures-platform.com api.futures-platform.com;
    return 301 https://$server_name$request_uri;  # HTTP → HTTPS
}

server {
    listen 443 ssl http2;
    server_name api.futures-platform.com;

    # ─── TLS 证书 ───
    ssl_certificate     /etc/nginx/certs/futures-cert.pem;
    ssl_certificate_key /etc/nginx/certs/futures-key.pem;

    # ─── TLS 安全配置 ───
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── 安全头 ───
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # ─── 反向代理到 Gateway ───
    location / {
        proxy_pass http://futures-gateway:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
