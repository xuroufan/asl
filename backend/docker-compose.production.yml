networks:
  futures-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  nacos_data:
  prometheus_data:
  grafana_data:
  loki_data:

services:
  # ==================== 基础设施 ====================
  mysql:
    image: mysql:8.0
    container_name: futures-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: futures_order
      MYSQL_USER: ${MYSQL_USER:-futures}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/scripts/init-schema.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 1G, cpus: '1.0' }

  redis:
    image: redis:7-alpine
    container_name: futures-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: futures-nacos
    environment:
      MODE: standalone
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: ${MYSQL_USER:-futures}
      MYSQL_SERVICE_PASSWORD: ${MYSQL_PASSWORD}
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:-FuturesPlatformSecretKey2024ForJWT}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:-futures}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:-futures123}
    ports:
      - "8848:8848"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  rocketmq-namesrv:
    image: apache/rocketmq:5.2.0
    container_name: futures-rocketmq-ns
    environment:
      JAVA_OPT_EXT: "-server -Xms256m -Xmx256m"
    command: sh mqnamesrv
    ports:
      - "9876:9876"
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.25' }

  rocketmq-broker:
    image: apache/rocketmq:5.2.0
    container_name: futures-rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m -Xmn256m"
    ports:
      - "10909:10909"
      - "10911:10911"
    command: sh mqbroker
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 1G, cpus: '0.5' }

  seata-server:
    image: seataio/seata-server:1.8.0
    container_name: futures-seata
    environment:
      SEATA_PORT: 8091
      STORE_MODE: db
    ports:
      - "8091:8091"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  # ==================== 微服务 ====================
  gateway:
    build:
      context: .
      args: { SERVICE: gateway, SERVICE_PORT: 8088 }
    image: futures/gateway:${IMAGE_TAG:-latest}
    container_name: futures-gateway
    ports:
      - "8088:8088"
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  account:
    build:
      context: .
      args: { SERVICE: account, SERVICE_PORT: 8083 }
    image: futures/account:${IMAGE_TAG:-latest}
    container_name: futures-account
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos: { condition: service_started }
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  order:
    build:
      context: .
      args: { SERVICE: order, SERVICE_PORT: 8081 }
    image: futures/order:${IMAGE_TAG:-latest}
    container_name: futures-order
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos: { condition: service_started }
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  matching:
    build:
      context: .
      args: { SERVICE: matching, SERVICE_PORT: 8082 }
    image: futures/matching:${IMAGE_TAG:-latest}
    container_name: futures-matching
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos: { condition: service_started }
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  market:
    build:
      context: .
      args: { SERVICE: market, SERVICE_PORT: 8086 }
    image: futures/market:${IMAGE_TAG:-latest}
    container_name: futures-market
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos: { condition: service_started }
      mysql: { condition: service_healthy }
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  fund:
    build:
      context: .
      args: { SERVICE: fund, SERVICE_PORT: 8084 }
    image: futures/fund:${IMAGE_TAG:-latest}
    container_name: futures-fund
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos: { condition: service_started }
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  risk:
    build:
      context: .
      args: { SERVICE: risk, SERVICE_PORT: 8085 }
    image: futures/risk:${IMAGE_TAG:-latest}
    container_name: futures-risk
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos: { condition: service_started }
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  settlement:
    build:
      context: .
      args: { SERVICE: settlement, SERVICE_PORT: 8087 }
    image: futures/settlement:${IMAGE_TAG:-latest}
    container_name: futures-settlement
    environment:
      NACOS_ADDR: nacos:8848
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      nacos: { condition: service_started }
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  # ==================== 监控 ====================
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: futures-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/scripts/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/scripts/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: '0.5' }

  grafana:
    image: grafana/grafana:10.4.2
    container_name: futures-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-futures123}
      - GF_SERVER_HTTP_PORT=3002
    ports:
      - "3002:3002"
    volumes:
      - ./infrastructure/scripts/grafana-datasources.yml:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 256M, cpus: '0.25' }

  loki:
    image: grafana/loki:2.9.4
    container_name: futures-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./infrastructure/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 256M, cpus: '0.25' }

  # ==================== 负载均衡 ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: futures-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/certs:/etc/nginx/certs:ro
    depends_on:
      - gateway
    networks:
      - futures-net
    deploy:
      resources:
        limits: { memory: 128M, cpus: '0.1' }
  # ==================== 微服务 ====================
