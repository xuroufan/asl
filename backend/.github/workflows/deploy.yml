name: Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JARs
        run: mvn package -DskipTests --no-transfer-progress -q

      - name: Build Docker Images
        run: |
          for service in gateway account order matching fund risk market settlement; do
            docker build --build-arg SERVICE=$service --build-arg SERVICE_PORT=$(cat /dev/stdin <<< "8088 8083 8081 8082 8084 8085 8086 8087" | awk "{print \$$((i+=1))}") -t futures/$service:${{ github.ref_name }} .
          done

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/futures-platform
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d --force-recreate
            echo "Deployment complete: ${{ github.ref_name }}"
