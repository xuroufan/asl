server:
  port: 8099
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: futures-admin
  datasource:
    url: jdbc:mysql://localhost:3306/futures_admin?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: futures
    password: ${DB_PASSWORD:futures123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 30000
      validation-query: SELECT 1
      test-on-borrow: true
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:futures123}
      database: 1
      timeout: 3000ms
      jedis:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.futures.admin.entity

logging:
  level:
    com.futures.admin: DEBUG
    com.futures.admin.mapper: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    db:
      enabled: false

# JWT 配置
jwt:
  secret: ${JWT_SECRET:futures-admin-secret-key-2024-rsa-encrypted}
  expiration: 86400000  # 24小时
  refresh-expiration: 604800000  # 7天

# 管理后台配置
admin:
  captcha-enabled: true
  login-max-retry: 5
  login-lock-duration: 15
