input {
  beats {
    port => 5044
  }
  # Also accept JSON logs directly from file tail
  file {
    path => "/var/log/futures/**/application.json"
    type => "futures-json"
    start_position => "end"
    sincedb_path => "/var/lib/logstash/sincedb"
    codec => json
  }
}

filter {
  if [type] == "futures-json" {
    # Already JSON format - just validate
    mutate {
      add_tag => ["futures"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "futures-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "futures123"
  }
}
