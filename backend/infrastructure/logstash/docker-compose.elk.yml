version: '3.8'
services:
  logstash:
    image: logstash:7.14.0
    container_name: futures-logstash
    environment:
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - /var/log/futures:/var/log/futures:ro
    depends_on:
      - elasticsearch
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  kibana:
    image: kibana:7.14.0
    container_name: futures-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: futures123
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - futures-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.25'
