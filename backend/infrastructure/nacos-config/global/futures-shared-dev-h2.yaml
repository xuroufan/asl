# ============================================================
# 全局共享配置 - 开发环境 (H2 内存数据库版)
# Data ID: futures-shared-dev-h2.yaml | Group: GLOBAL_GROUP
# 适用于所有服务使用 H2 内存数据库的开发模式
# ============================================================

# --- 1. 数据源配置 (H2) ---
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:futures_db;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    h2:
      console:
        enabled: true
        path: /h2-console
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000
      pool-name: FuturesH2Pool
      connection-test-query: SELECT 1

  sql:
    init:
      mode: always

# --- 2. Redis 配置 (单机版) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:futures123}
      database: 0
      timeout: 3000ms
      jedis:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 2000ms

# --- 3. MyBatis-Plus ---
mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
