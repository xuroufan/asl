# ============================================================
# 全局共享配置 - 开发环境 (Data ID: futures-shared-dev.yaml, Group: GLOBAL_GROUP)
# 所有微服务通过 spring.cloud.nacos.config.shared-configs 引用
# ============================================================

# --- 1. 数据源配置 ---
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql-master}:${MYSQL_PORT:3306}/futures_order?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${MYSQL_USER:futures}
    password: ${MYSQL_PASSWORD}
    # HikariCP 连接池
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1200000
      pool-name: FuturesPool
      connection-test-query: SELECT 1

# --- 2. Redis 配置 ---
  data:
    redis:
      host: ${REDIS_HOST:redis-master}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 2000ms
      sentinel:
        master: futures-master
        nodes: ${REDIS_SENTINELS:redis-sentinel-1:26379,redis-sentinel-2:26379}

# --- 3. RocketMQ 配置 ---
rocketmq:
  name-server: ${ROCKETMQ_NS:rocketmq-namesrv:9876}
  producer:
    group: futures-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 3

# --- 4. Seata 配置 ---
seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: futures_tx_group
  service:
    vgroup-mapping:
      futures_tx_group: default
    grouplist:
      default: ${SEATA_ADDR:seata-server:8091}
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_ADDR:nacos:8848}
      group: SEATA_GROUP

# --- 5. MyBatis-Plus ---
mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# --- 6. SkyWalking 配置 (agent 端) ---
# 需在 JVM 启动参数中配置:
# -javaagent:/path/to/skywalking-agent.jar
# -Dskywalking.agent.service_name=${spring.application.name}
# -Dskywalking.collector.backend_service=skywalking-oap:11800
