# CD: Release
# 打 tag v* 时自动构建签名 Release AAB/Bundle，发布到 GitHub Releases

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/configuration-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ---- 签名配置 ----
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set signing env vars
        run: |
          echo "KEYSTORE_FILE=${{ github.workspace }}/app/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      # 验证 keystore（防止空 secret 导致 build 失败后才暴露）
      - name: Verify keystore
        run: keytool -list -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" -keypass "$KEY_PASSWORD" 2>&1 | head -5

      # ---- 构建 ----
      - name: Run checks
        run: ./gradlew lintDevDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew testDevDebugUnitTest --no-daemon --stacktrace

      - name: Build Release AAB (all flavors)
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      # ---- 收集构建产物 ----
      - name: Collect AABs
        run: |
          mkdir -p release-artifacts
          find app/build/outputs/bundle -name "*.aab" -exec cp {} release-artifacts/ \;

      - name: Build release APKs
        run: ./gradlew assembleRelease --no-daemon --stacktrace || true

      # ---- GitHub Release ----
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## ASL ${{ github.ref_name }}

            ### 下载
            - **Android App Bundle (AAB)** — 各环境的 release bundle
            - **APK** — dev / staging / prod 的 release APK

            ### 构建信息
            - Commit: ${{ github.sha }}
          files: |
            release-artifacts/*.aab
            app/build/outputs/apk/**/release/*.apk
          draft: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AABs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asl-release-${{ github.ref_name }}
          path: release-artifacts/
          retention-days: 90
