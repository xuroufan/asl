name: Build & Push

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build JARs
        run: mvn package -Dmaven.test.skip=true -T 4
        working-directory: backend

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Docker images
        run: |
          SERVICES="order:8081 matching:8082 account:8083 fund:8084 risk:8085 market:8086 settlement:8087 push:8093 admin:8099 gateway:8088"
          for spec in $SERVICES; do
            IFS=':' read -r svc port <<< "$spec"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/$svc"
            docker build \
              --build-arg SERVICE=$svc \
              --build-arg SERVICE_PORT=$port \
              -t $IMAGE:latest \
              -t $IMAGE:${{ github.sha }} \
              backend/
            docker push $IMAGE:latest
          done
